apiVersion: apps/v1
kind: Deployment
metadata: { name: statuskit, labels: { app: statuskit } }
spec:
  replicas: 1
  selector: { matchLabels: { app: statuskit } }
  template:
    metadata: { labels: { app: statuskit } }
    spec:
      containers:
        - name: statuskit
          image: ghcr.io/cognis-digital/statuskit:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: statuskit }
spec:
  selector: { app: statuskit }
  ports: [{ port: 80, targetPort: 8000 }]
